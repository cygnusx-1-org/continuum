spotless {
    java {
        target '**/*.java'
        importOrder()
        removeUnusedImports()
        trimTrailingWhitespace()
        leadingTabsToSpaces(4)
    }
    format 'misc', {
        target '**/*.gradle', '**/*.md', '**/.gitignore'
        leadingTabsToSpaces(4)
        trimTrailingWhitespace()
    }
    format 'xml', {
        target '**/*.xml'
        leadingTabsToSpaces(4)
        trimTrailingWhitespace()
    }
}

// Replaces the legacy applicationVariants APK-renaming (removed by AGP 9's new DSL). For each
// variant, transforms the APK artifact so each per-ABI output becomes
// "continuum-<abi>-<versionName><-dirty?>.apk". versionName carries only the build-type suffix
// (e.g. "-debug"); the "-dirty" marker is appended at execution time in RenameApksTask.taskAction.
androidComponents {
    onVariants(selector().all()) { variant ->
        def renameProvider = tasks.register("rename${variant.name.capitalize()}Apks", RenameApksTask) {
            // Pin the git dirty check to the repo root so it's independent of the process CWD.
            it.repoRoot.set(rootProject.layout.projectDirectory)
            // Always re-run so the git dirty check reflects the current tree. The task's other
            // inputs (base name, packaged APK) don't change when only the commit state does, so
            // without this a "-dirty" name could linger after committing (or vice versa).
            it.outputs.upToDateWhen { false }
        }
        def request = variant.artifacts.use(renameProvider)
            .wiredWithDirectories(
                { it.getApkFolder() } as kotlin.jvm.functions.Function1,
                { it.getOutFolder() } as kotlin.jvm.functions.Function1)
            .toTransformMany(SingleArtifact.APK.INSTANCE)
        renameProvider.configure { it.transformationRequest.set(request) }
    }
}

interface CopyApkParameters extends WorkParameters, Serializable {
    RegularFileProperty getInputApkFile()
    RegularFileProperty getOutputApkFile()
}

abstract class CopyApkWorkAction implements WorkAction<CopyApkParameters> {
    @Override
    void execute() {
        def output = parameters.outputApkFile.get().asFile
        output.delete()
        java.nio.file.Files.copy(parameters.inputApkFile.get().asFile.toPath(), output.toPath())
    }
}

abstract class RenameApksTask extends DefaultTask {
    @InputFiles
    abstract DirectoryProperty getApkFolder()

    @OutputDirectory
    abstract DirectoryProperty getOutFolder()

    @Internal
    abstract Property<ArtifactTransformationRequest<RenameApksTask>> getTransformationRequest()

    // Git repo root, captured at configuration time and used as the git command's working directory
    // so the dirty check runs inside the repo regardless of the Gradle process CWD (a CWD outside the
    // repo would make git exit non-zero and silently report a dirty build as clean). @Internal — not
    // @Input — so Gradle doesn't snapshot the whole tree; upToDateWhen { false } already forces re-run.
    @Internal
    abstract DirectoryProperty getRepoRoot()

    private final WorkerExecutor workerExecutor
    private final ExecOperations execOps

    @Inject
    RenameApksTask(WorkerExecutor workerExecutor, ExecOperations execOps) {
        this.workerExecutor = workerExecutor
        this.execOps = execOps
    }

    // "-dirty" when tracked files have uncommitted changes, else "". Untracked files are
    // ignored so stray local files don't flag an otherwise-clean build. A missing git binary
    // or non-repo checkout yields "" quietly instead of failing the build.
    private String gitDirtySuffix() {
        try {
            def stdout = new ByteArrayOutputStream()
            def result = execOps.exec { spec ->
                spec.workingDir = repoRoot.get().asFile
                spec.commandLine 'git', 'status', '--porcelain', '--untracked-files=no'
                spec.standardOutput = stdout
                spec.errorOutput = new ByteArrayOutputStream() // keep git stderr out of the build log
                spec.ignoreExitValue = true
            }
            return (result.exitValue == 0 && stdout.toString().trim()) ? "-dirty" : ""
        } catch (Exception ignored) {
            return ""
        }
    }

    @TaskAction
    void taskAction() {
        // Remove APKs left by previous builds before producing this build's outputs.
        // Filenames embed the versionName, so a new build creates new files instead of
        // overwriting old ones; without this, stale older-version APKs accumulate in the
        // output folder (and would otherwise be picked up by the GitHub release upload).
        outFolder.get().asFile.listFiles()?.each { File f ->
            if (f.name.endsWith(".apk")) {
                f.delete()
            }
        }

        // Computed here (execution time) so it reflects the working tree on every build and is
        // correct under the configuration cache. Captured by the work-action closure below.
        def dirty = gitDirtySuffix()

        transformationRequest.get().submit(
            this,
            workerExecutor.noIsolation(),
            CopyApkWorkAction.class,
            { BuiltArtifact builtArtifact, Directory outputLocation, CopyApkParameters params ->
                def abi = builtArtifact.filters.find {
                    it.filterType == FilterConfiguration.FilterType.ABI
                }?.identifier
                def abiPart = abi ? "-${abi}" : ""
                def newName = "continuum${abiPart}-${builtArtifact.versionName}${dirty}.apk"
                params.inputApkFile.set(new File(builtArtifact.outputFile))
                params.outputApkFile.set(new File(outputLocation.asFile, newName as String))
                return params.outputApkFile.get().asFile
            } as kotlin.jvm.functions.Function3
        )
    }
}
