android {
    def keystorePropertiesFile = rootProject.file("keystore.properties")

    if (keystorePropertiesFile.exists()) {
        def keystoreProperties = new Properties()
        keystoreProperties.load(new FileInputStream(keystorePropertiesFile))

        signingConfigs {
            release {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    } else {
        println("Warning: keystore.properties file not found. Skipping signing configuration.")
    }

    def testPropertiesFile = rootProject.file("test.properties")
    def testProperties = new Properties()

    if (testPropertiesFile.exists()) {
        testProperties.load(new FileInputStream(testPropertiesFile))
    } else {
        println("Warning: test.properties file not found. Using default test values.")
    }

    // Custom APK names are applied via the new Variant API below (see the androidComponents block at
    // the end of this file). AGP 9's new DSL removed applicationVariants.outputs.outputFileName.

    compileSdk 37

    defaultConfig {
        applicationId "org.cygnusx1.continuum"
        javaCompileOptions {
            annotationProcessorOptions {
                arguments = [eventBusIndex: 'ml.docilealligator.infinityforreddit.EventBusIndex']
            }
        }

        minSdk 24
        targetSdk 35
        versionCode 223
        versionName "8.2.5.9.9.8"
        testInstrumentationRunner "com.kaspersky.kaspresso.runner.KaspressoRunner"
        testInstrumentationRunnerArguments.put("REDDIT_CLIENT_ID", testProperties['REDDIT_CLIENT_ID'] ?: 'test_reddit_client_id_default')
    }

    buildFeatures {
        buildConfig = true
        viewBinding = true
    }

    buildTypes {
        release {
            if (keystorePropertiesFile.exists()) {
                signingConfig = signingConfigs.release
            } else {
                println("Warning: keystore.properties file not found. Skipping signing configuration for release.")
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            resValue "string", "app_name", "Continuum"
        }
        minifiedRelease {
            initWith buildTypes.release
            zipAlignEnabled true
            minifyEnabled true
            shrinkResources = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        beta {
            initWith buildTypes.release
            applicationIdSuffix '.beta'
            // On-screen app name is overridden via the src/beta/res/values/strings.xml
            // application_name string (mirroring src/debug), which is what the launcher label
            // and toolbar actually use.
        }
        debug {
            applicationIdSuffix '.debug'
            versionNameSuffix '-debug'
            resValue "string", "app_name", "Continuum Debug"
        }
    }

    bundle {
        language {
            enableSplit = false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_24
        targetCompatibility JavaVersion.VERSION_24
    }

    testOptions {
        animationsDisabled = true
        //execution 'ANDROIDX_TEST_ORCHESTRATOR'
        unitTests.returnDefaultValues = true
        // Robolectric needs real merged resources to resolve string IDs in unit tests.
        unitTests.includeAndroidResources = true
        unitTests.all {
            useJUnitPlatform()
        }
    }

    buildFeatures {
        buildConfig = true
        viewBinding = true
        compose = true
        // Required because build types use resValue (release/debug app_name); the global
        // android.defaults.buildfeatures.resvalues default is off in AGP 9.
        resValues = true
    }

    lint {
        baseline = file("lint-baseline.xml")
        disable 'MissingTranslation'
    }

    namespace = 'ml.docilealligator.infinityforreddit'

    splits {
        abi {
            enable = true
            reset()
            include 'armeabi-v7a', 'arm64-v8a'
            universalApk = false  // Set to true if you also want a universal APK
        }
    }

    composeOptions {
        kotlinCompilerExtensionVersion = "1.5.14"
    }

}

// NullAway compile-time null checking, run via Error Prone. Scope is intentionally
// tight: every other Error Prone check is disabled, and NullAway only analyzes code
// under an @NullMarked scope (OnlyNullMarked), so the build stays green until a
// package opts in with a @NullMarked package-info.java. Roll out one package at a
// time. Dagger @Inject fields are treated as initialized without a constructor
// assignment: NullAway's default ExcludedFieldAnnotations set already includes
// javax.inject.Inject and jakarta.inject.Inject, so injected fields won't trip the
// initialization check. We extend that set (additively — NullAway seeds it from its
// DEFAULT_EXCLUDED_FIELD_ANNOT, so @Inject stays covered) with androidx.room.Embedded
// and androidx.room.Relation (Room fills those relation POJO fields via generated code)
// plus com.google.gson.annotations.SerializedName (Gson fills @SerializedName fields via
// reflection) — all initialized-by-framework the same way @Inject fields are. Genuinely
// nullable framework fields are still marked @Nullable individually (e.g. a Gson field the
// API may omit), exactly as before; the exclusion only suppresses the initialization check.
//
// Room's generated DAO _Impl classes are emitted into the SAME package as the @Dao
// interface, so a @NullMarked package-info.java also covers them, and NullAway would
// then flag their cursor-reading code (nullable column reads assigned to @NonNull entity
// fields). TreatGeneratedAsUnannotated makes NullAway skip any class annotated @Generated
// (Room, Dagger, etc. all carry it), which is exactly what we want: generated code is not
// ours to null-annotate. Hand-written code is unaffected.
//
// The net.ltgt.errorprone plugin does NOT auto-wire Error Prone into Android Gradle
// Plugin builds (it only supplies the `errorprone` extension and leaves the checker
// disabled). So we enable it by hand here; the Error Prone/NullAway jars reach javac's
// plugin path via the debugAnnotationProcessor dependencies above, and the JDK-internal
// exports the checker needs are in gradle.properties.
//
// Enforcement is scoped to exactly one task: the main debug variant compile. All
// production Java lives in src/main (there are no variant-specific Java source sets), so
// every variant compiles identical sources — checking one is enough, and NullAway is a
// pure compile-time check that never alters output, so release/beta/minifiedRelease
// artifacts are byte-for-byte identical whether or not it also runs there. Matching a
// single explicit task name (rather than "every non-test compile") is also a safe
// allowlist: any other JavaCompile task — the release/beta/minifiedRelease main compiles,
// the unit/android test compiles (whose *AnnotationProcessor configs don't carry Error
// Prone), or anything AGP/a plugin adds later — stays OFF and can never hard-fail with
// "plug-in not found". To also enforce on another variant, add its compile task to this
// check AND add the error_prone_core + nullaway deps to that variant's *AnnotationProcessor
// config (they are on debugAnnotationProcessor here).
tasks.withType(JavaCompile).configureEach { compileTask ->
    options.errorprone {
        enabled = compileTask.name == 'compileDebugJavaWithJavac'
        disableAllChecks = true
        check('NullAway', CheckSeverity.ERROR)
        option('NullAway:OnlyNullMarked', 'true')
        option('NullAway:JSpecifyMode', 'true')
        option('NullAway:ExcludedFieldAnnotations', 'androidx.room.Embedded,androidx.room.Relation,com.google.gson.annotations.SerializedName')
        option('NullAway:TreatGeneratedAsUnannotated', 'true')
    }
}

def githubPropertiesFile = rootProject.file("github.properties")

if (githubPropertiesFile.exists()) {
    def githubProperties = new Properties()
    githubProperties.load(new FileInputStream(githubPropertiesFile))

    githubRelease {
        def releaseNotes = System.getenv("RELEASE_NOTES") ?: "Automated release of version ${android.defaultConfig.versionName ?: "default-version"}"

        // RELEASE_VARIANT (set by scripts/release-github.sh) selects where the release is
        // published: "beta" targets the separate continuum-beta repo with the beta APKs;
        // anything else is a normal release to the continuum repo.
        def isBeta = (System.getenv("RELEASE_VARIANT") ?: "release") == "beta"
        def apkDirName = isBeta ? "beta" : "release"

        token = githubProperties["githubToken"]
        owner = "cygnusx-1-org"
        repo = isBeta ? "continuum-beta" : "continuum"
        tagName = android.defaultConfig.versionName ?: "default-version"
        targetCommitish = "master"
        releaseName = "Release ${android.defaultConfig.versionName ?: "default-version"}"
        body = "$releaseNotes"
        draft = false
        prerelease = false
        overwrite = false

        // Dynamically set releaseAssets by searching the APK path for the selected variant
        def apkFiles = fileTree(dir: "build/outputs/apk/${apkDirName}/", include: "*.apk").files.toList()
        if (apkFiles.isEmpty()) {
            println("Warning: No APK files found in the directory 'build/outputs/apk/${apkDirName}/'.")
        } else {
            releaseAssets = apkFiles
        }
    }
} else {
    println("Warning: github.properties file not found. Skipping GitHub release configuration.")
}

allure {
