# Project-wide Gradle settings.

# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.

# For more details on how to configure your build environment visit
# http://www.gradle.org/docs/current/userguide/build_environment.html

# Specifies the JVM arguments used for the daemon process.
# The setting is particularly useful for tweaking memory settings.
android.nonTransitiveRClass=false
android.useAndroidX=true
# Error Prone runs in-process: AGP 9 compiles Java with the JDK compiler API on the Gradle
# daemon JVM, so javac *is* the daemon. Error Prone reaches into javac internals, which JEP
# 396 strongly encapsulates on JDK 16+, so these exports/opens must live on the daemon JVM
# itself — without them the checker silently no-ops. They can't be scoped to just the
# compile task without forking a separate javac, which AGP's in-process compiler avoids for
# build speed; the flags are inert for every other task, so daemon-wide is the correct home.
org.gradle.jvmargs=-Xmx6g -XX:+UseParallelGC --enable-native-access=ALL-UNNAMED \
  --add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED \
  --add-exports=jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED \
  --add-exports=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED \
  --add-exports=jdk.compiler/com.sun.tools.javac.model=ALL-UNNAMED \
  --add-exports=jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED \
  --add-exports=jdk.compiler/com.sun.tools.javac.processing=ALL-UNNAMED \
  --add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED \
  --add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED \
  --add-opens=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED \
  --add-opens=jdk.compiler/com.sun.tools.javac.comp=ALL-UNNAMED

# When configured, Gradle will run in incubating parallel mode.
# This option should only be used with decoupled projects. More details, visit
# http://www.gradle.org/docs/current/userguide/multi_project_builds.html#sec:decoupled_projects
# org.gradle.parallel=true

# Cache task outputs (e.g. lint) across builds so they aren't re-run from scratch.
org.gradle.caching=true
org.gradle.configuration-cache=true
android.uniquePackageNames=false
android.dependency.useConstraints=false
android.r8.strictFullModeForKeepRules=false
